<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0c10">
  <title>Reports – FinTrack</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .chart-card  { background:var(--card); border-radius:var(--radius-lg); padding:1.5rem; border:1px solid var(--border); margin-bottom:1.25rem; }
    .chart-title { font-size:.8125rem; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.08em; margin-bottom:1.5rem; }
    .chart-wrap  { position:relative; }
    .year-filter { display:flex; align-items:center; gap:.75rem; flex-wrap:wrap; margin-bottom:2rem; }
    .year-filter label { font-size:.6875rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; }
    .year-filter select { width:auto; min-width:120px; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.875rem; margin-bottom:1.75rem; }
    .stat-box  { background:var(--card); border-radius:var(--radius-lg); padding:1.1rem 1.25rem; border:1px solid var(--border); }
    .stat-val  { font-size:1.4rem; font-weight:700; color:var(--primary); font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
    .stat-lbl  { font-size:.6875rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; margin-top:5px; }
    .report-summary { margin-bottom:1rem; padding:1rem 1.1rem; }
    .report-summary h3 { font-size:.78rem; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.55rem; }
    .report-summary ul { margin:0; padding-left:1rem; display:grid; gap:.28rem; }
    .report-summary li { color:var(--text-2); font-size:.82rem; line-height:1.45; }
    .report-summary .scope { color:var(--text-3); font-size:.74rem; margin-bottom:.5rem; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <button class="menu-toggle" id="menu-toggle" aria-label="Open navigation"></button>
    <a href="index.html" class="nav-brand">
      <div class="nav-brand-icon">₹</div>
      FinTrack
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html"     class="nav-link">Dashboard</a>
      <a href="new-entry.html" class="nav-link">New Entry</a>
      <a href="admin.html"     class="nav-link">Admin</a>
      <a href="reports.html"   class="nav-link">Reports</a>
      <a href="income-log.html" class="nav-link">Income Log</a>
    </div>
    <div class="nav-right">
      <button class="perf-toggle" id="perf-toggle" title="Toggle performance mode">⚡</button>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀️</button>
    </div>
  </div>
</nav>

<main class="main compact-reports">

  <div class="page-header">
    <div>
      <h1 class="page-title">Reports</h1>
      <p class="page-subtitle">Visual overview of your spending</p>
    </div>
  </div>

  <div class="year-filter">
    <label>Year</label>
    <select id="rep-year"></select>
    <label>Month</label>
    <select id="rep-month">
      <option value="">All Months</option>
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>
    <button class="btn btn-primary btn-sm" id="rep-apply">Load</button>
  </div>

  <div class="chart-card report-summary" id="rep-summary">
    <h3>Transaction Summary</h3>
    <p class="scope">Loading…</p>
  </div>

  <div class="stat-grid" id="stat-grid">
    <div class="stat-box"><div class="skeleton" style="height:60px"></div></div>
    <div class="stat-box"><div class="skeleton" style="height:60px"></div></div>
    <div class="stat-box"><div class="skeleton" style="height:60px"></div></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Monthly Spending — <span id="chart1-year"></span></div>
    <div class="chart-wrap" style="height:220px"><canvas id="chart-monthly"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Spending by Category</div>
    <div class="chart-wrap" style="height:250px"><canvas id="chart-category"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Monthly Breakdown by Category</div>
    <div class="chart-wrap" style="height:270px"><canvas id="chart-stacked"></canvas></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/db.js"></script>
<script src="js/common.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
