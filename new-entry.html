<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0c10">
  <title>New Entry – FinTrack</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <button class="menu-toggle" id="menu-toggle" aria-label="Open navigation"></button>
    <a href="index.html" class="nav-brand">
      <div class="nav-brand-icon">₹</div>
      FinTrack
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html"     class="nav-link">Dashboard</a>
      <a href="new-entry.html" class="nav-link">New Entry</a>
      <a href="admin.html"     class="nav-link">Admin</a>
      <a href="reports.html"   class="nav-link">Reports</a>
    </div>
    <div class="nav-right">
      <button class="perf-toggle" id="perf-toggle" title="Toggle performance mode">⚡</button>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀️</button>
    </div>
  </div>
</nav>

<main class="main compact-entry">

  <div class="page-header">
    <div>
      <h1 class="page-title" id="page-heading">New Entry</h1>
      <p class="page-subtitle" id="page-sub">Record a new expenditure</p>
    </div>
    <a href="index.html" class="btn btn-ghost">← Back</a>
  </div>

  <div class="form-card">
    <form id="entry-form" class="form-stack">

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="field-date" required>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="field-cat" required>
          <option value="">— Select category —</option>
        </select>
        <span class="field-error" id="err-cat">Please select a category</span>
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <div class="input-prefix">
          <span>₹</span>
          <input type="text" id="field-amount" placeholder="0"
                 inputmode="decimal" autocomplete="off" required>
        </div>
        <span class="field-hint">Minimum ₹1 · Commas added automatically</span>
        <span class="field-error" id="err-amount">Amount must be ≥ ₹1</span>
      </div>

      <div class="form-group">
        <label>Notes <span class="text-muted">(optional)</span></label>
        <input type="text" id="field-notes" placeholder="e.g. Lunch at office, Bus ticket…"
               maxlength="200">
      </div>

      <div class="btn-group" style="margin-top:.5rem">
        <button type="submit" class="btn btn-primary" id="submit-btn">Save Entry</button>
        <button type="button" class="btn btn-ghost"   id="clear-btn">Clear</button>
      </div>

    </form>
  </div>

</main>

<script src="js/db.js"></script>
<script src="js/common.js"></script>
<script src="js/new-entry.js"></script>
</body>
</html>
